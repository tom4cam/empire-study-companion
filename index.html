<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <title>RE CE Study Companion</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1 id="app-title">RE CE Study Companion</h1>
    <label class="picker">
      <span class="picker-label">Course</span>
      <select id="course-picker"></select>
    </label>
    <label class="picker">
      <span class="picker-label">Unit</span>
      <select id="module-picker"></select>
    </label>
  </header>

  <main id="view" class="view">
    <div id="loading" class="empty">Loading study material…</div>
  </main>

  <nav class="tabbar" role="tablist">
    <button class="tab" data-tab="read" aria-selected="true">📖<span>Read</span></button>
    <button class="tab" data-tab="quiz" aria-selected="false">✓<span>Quiz</span></button>
    <button class="tab" data-tab="cards" aria-selected="false">🗂<span>Cards</span></button>
    <button class="tab" data-tab="summary" aria-selected="false">★<span>Summary</span></button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
